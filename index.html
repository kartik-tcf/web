<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheiling House Crime Control</title>
<link rel="stylesheet" href="style.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a0e27;
    color: #e0e0e0;
    font-family: 'Arial', sans-serif;
    overflow-x: hidden;
  }

  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    min-height: 100vh;
    padding: 60px 40px;
    align-items: center;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
  }

  .left {
    z-index: 2;
  }

  .club {
    font-size: 14px;
    letter-spacing: 2px;
    color: #00d4ff;
    margin-bottom: 30px;
    font-weight: bold;
    text-transform: uppercase;
    line-height: 1.8;
  }

  .title {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 30px;
    background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .right {
    position: relative;
  }

  .grid-dots {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle, rgba(0, 212, 255, 0.3) 1px, transparent 1px);
    background-size: 30px 30px;
    opacity: 0.5;
    border-radius: 8px;
  }

  .description {
    position: relative;
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 30px;
    color: #b0b0b0;
    max-width: 400px;
  }

  .btn {
    position: relative;
    display: inline-block;
    padding: 14px 40px;
    background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
    color: #0a0e27;
    text-decoration: none;
    font-weight: bold;
    letter-spacing: 1px;
    border-radius: 4px;
    transition: all 0.3s ease;
    text-transform: uppercase;
    font-size: 14px;
    box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(0, 212, 255, 0.5);
    background: linear-gradient(135deg, #00e5ff 0%, #00aaff 100%);
  }

  @media (max-width: 768px) {
    .hero {
      grid-template-columns: 1fr;
      padding: 40px 20px;
      gap: 20px;
    }

    .title {
      font-size: 36px;
    }

    .description {
      max-width: 100%;
    }
  }
</style>
</head>

<body>

<section class="hero">

  <div class="left">
    <div class="club">
      SHEILING<br>
      HOUSE<br>
      COMPUTER<br>
      CLUB
    </div>

    <h1 class="title">
      SHEILING HOUSE<br>
      CRIME CONTROL
    </h1>
  </div>

  <div class="right">
    <div class="grid-dots"></div>

    <p class="description">
      Do you have the intellect to manage and solve
      the murder of Riddam Gupta?
    </p>

    <a href="rules.html" class="btn">
      LEARN MORE
    </a>
  </div>

</section>

</body>
</html>
